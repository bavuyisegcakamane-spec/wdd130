<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Quiz</title>
    <meta name="description" content="A quiz form about HTML and CSS.">
    <meta name="author" content="Bavuyise Azania Gcakamane">
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>HTML and CSS Quiz</h1>

        <form>
            <div class="form-item">
                <label for="q1">1. What does HTML stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="form-item">
                <label for="q2">2. In your own words, what is the purpose of CSS?</label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <div class="form-item">
                <label for="q3">3. Which HTML element is used to link an external CSS file?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="style">&lt;style&gt;</option>
                    <option value="css">&lt;css&gt;</option>
                    <option value="link">&lt;link&gt;</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">4. How many heading levels does HTML have?</label>
                <input type="number" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
